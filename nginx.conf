user  nginx;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Serve the PRE-COMPRESSED assets Vite emits next to each file
    # (index-*.js.gz etc.). This ships the ~9 MB main bundle as ~2.7 MB on the
    # wire with zero runtime CPU — critical when Envoy fetches it over a Swarm
    # overlay (a too-large raw response truncates on lossy/cross-DC links and
    # the browser shows ERR_HTTP2_PROTOCOL_ERROR). Stock nginx ships the
    # http_gzip_static module.
    gzip_static on;
    gzip_vary on;

    # On-the-fly gzip for responses with no pre-built .gz (html, json, config.js).
    # NB: modern nginx serves .js as `text/javascript`, so it MUST be listed
    # here or JS would not be compressed at all.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    server {
        listen       8080;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
