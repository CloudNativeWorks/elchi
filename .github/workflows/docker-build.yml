name: Build and Push Image

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  DOCKER_IMAGE: elchi
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main branch (for VERSION)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Triggered automatically by release publish - use the tag
            RAW="${{ github.event.release.tag_name }}"
            VERSION="${RAW#v}"
            echo "Trigger: release event (tag: ${RAW})"
          else
            # Manual trigger - read VERSION from main branch
            VERSION=$(cat VERSION)
            echo "Trigger: manual"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "PROJECT_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building version: v${VERSION}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ steps.version.outputs.version }}
          path: release
          token: ${{ secrets.GH_PAT }}

      - name: Download pre-built dist from release
        working-directory: release
        run: |
          ASSET="elchi-dist-v${PROJECT_VERSION}.tar.gz"
          echo "Downloading ${ASSET} from release v${PROJECT_VERSION}..."
          gh release download "v${PROJECT_VERSION}" \
            --repo "${{ github.repository }}" \
            -p "${ASSET}"
          tar -xzf "${ASSET}"
          rm "${ASSET}"
          echo "Dist contents (top level):"
          ls -la dist/ | head -10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push AMD64 image
        working-directory: release
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE_NAME="${DOCKER_USERNAME}/${DOCKER_IMAGE}"
          VERSION_TAG="${IMAGE_NAME}:v${PROJECT_VERSION}"
          LATEST_TAG="${IMAGE_NAME}:latest"

          echo "Building AMD64 image with tags:"
          echo "  ${VERSION_TAG}"
          echo "  ${LATEST_TAG}"

          docker buildx build \
            --no-cache \
            --platform linux/amd64 \
            --build-arg "APP_VERSION=${PROJECT_VERSION}" \
            -t "${VERSION_TAG}" \
            -t "${LATEST_TAG}" \
            --push \
            .

          echo "✅ AMD64 Docker image built and pushed"
          echo "Tags:"
          echo "  ${VERSION_TAG}"
          echo "  ${LATEST_TAG}"
